name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Restore Dependencies
        run: dotnet restore

      - name: Publish Application
        run: dotnet publish ".\LTEK ULed.Desktop\LucaLights.csproj" -c Release -o publish -r win-x64 --self-contained true /p:Version=${{ github.event.inputs.version }}

      - name: Download Previous Release
        run: vpk download github --repoUrl https://github.com/${{ github.repository }}
        continue-on-error: true

      - name: Create Velopack Release
        run: vpk pack -u LucaLights -v ${{ github.event.inputs.version }} -p publish -e LucaLights.exe -i ".\LTEK ULed.Desktop\installer-icon.ico"

      - name: Upload Velopack Release
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --tag v${{ github.event.inputs.version }} --releaseName "LucaLights v${{ github.event.inputs.version }}" --token ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Restore Dependencies
        run: dotnet restore

      - name: Publish Application
        run: dotnet publish "./LTEK ULed.Desktop/LucaLights.csproj" -c Release -o publish -r linux-x64 --self-contained true /p:Version=${{ github.event.inputs.version }}

      - name: Download Previous Release
        run: vpk download github --repoUrl https://github.com/${{ github.repository }}
        continue-on-error: true

      - name: Create Velopack Release
        run: vpk pack -u LucaLights -v ${{ github.event.inputs.version }} -p publish -e LucaLights --icon ./Assets/logo.png

      - name: Upload Linux Assets to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v${{ github.event.inputs.version }} Releases/* --repo ${{ github.repository }}
