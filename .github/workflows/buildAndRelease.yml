name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (for example 1.2.3 or v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Release Version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }

          $version = $version.Trim()
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version could not be resolved."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/lucalights-ui/package-lock.json

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Restore Dependencies
        shell: pwsh
        run: dotnet restore "Luca Lights.sln"

      - name: Publish Desktop App
        shell: pwsh
        run: >
          dotnet publish ".\src\LucaLights.Desktop\LucaLights.Desktop.csproj"
          -c Release
          -o publish
          -r win-x64
          --self-contained true
          /p:Version=${{ steps.version.outputs.version }}

      - name: Download Previous Velopack Releases
        shell: pwsh
        run: >
          vpk download github
          --repoUrl "https://github.com/${{ github.repository }}"
          --token "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - name: Pack Velopack Release
        shell: pwsh
        run: >
          vpk pack
          -u LucaLights
          -v ${{ steps.version.outputs.version }}
          -p publish
          -e LucaLights.Desktop.exe
          -i ".\src\LucaLights.Desktop\installer-icon.ico"

      - name: Upload Velopack Release
        shell: pwsh
        run: >
          vpk upload github
          --repoUrl "https://github.com/${{ github.repository }}"
          --tag "${{ steps.version.outputs.tag }}"
          --releaseName "LucaLights v${{ steps.version.outputs.version }}"
          --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LucaLights-${{ steps.version.outputs.version }}-windows-velopack
          path: Releases/*
          if-no-files-found: error
